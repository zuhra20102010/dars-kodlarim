<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <input id="inn" type="text" oninput="ishla()">

    <h1 id="hh"></h1>
    <script>
        function ishla() {

        let natija = document.getElementById("inn").value
             let son =0
            for (i = 1; i <= natija; i++) {
                son = son + i
            }
            document.getElementById("hh").innerHTML = son
        }
    </script>

</body>

</html>
